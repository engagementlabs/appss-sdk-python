name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  UV_LOCKED: "1"

jobs:
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Install project
        run: uv sync --extra dev
      - name: Ruff (lint)
        run: uv run ruff check .
      - name: Ruff (format check)
        run: uv run ruff format --check .

  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Install project
        run: uv sync --extra dev --extra aiogram --extra ptb
      - name: mypy
        run: uv run mypy

  test:
    name: Test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Install project
        run: uv sync --extra dev --extra aiogram --extra ptb --python ${{ matrix.python-version }}
      - name: pytest
        run: uv run pytest --cov --cov-report=xml --cov-report=term-missing

  build:
    name: Build & validate (dry-run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Build sdist and wheel
        run: uv build
      - name: Validate metadata (twine check)
        run: uvx twine check --strict dist/*
      - name: Smoke-test the built wheel
        run: |
          uv run --isolated --no-project --with dist/*.whl -- \
            python -c "import appss_sdk; print('built version:', appss_sdk.__version__)"
      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 7
