name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      target:
        description: "Where to publish the built distribution"
        type: choice
        default: testpypi
        options:
          - testpypi   # dry-run: build, validate and upload to TestPyPI only
          - none       # build + validate only, no upload

permissions:
  contents: read

jobs:
  build:
    name: Build & validate distribution
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Build sdist and wheel
        run: uv build

      - name: Validate metadata (twine check)
        run: uvx twine check --strict dist/*

      - name: Resolve & verify version
        id: version
        run: |
          set -euo pipefail
          # Version baked into the wheel by hatch-vcs (source of truth = git tag).
          version="$(uv run --isolated --no-project --with dist/*.whl -- \
            python -c 'import appss_sdk; print(appss_sdk.__version__)')"
          echo "Built version: $version"
          echo "version=$version" >> "$GITHUB_OUTPUT"

          # A local/dev segment means the tree was dirty or not on a clean tag.
          # PyPI rejects such versions — fail early with a clear message.
          if [[ "$version" == *"+"* || "$version" == *".dev"* ]]; then
            echo "::error::Refusing to release a non-clean version '$version'." \
              "Tag a clean commit (git tag vX.Y.Z && git push --tags)."
            exit 1
          fi

          # On a tag push, the tag must match the built version exactly.
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            tag="${GITHUB_REF#refs/tags/v}"
            if [[ "$tag" != "$version" ]]; then
              echo "::error::Tag 'v$tag' does not match built version '$version'."
              exit 1
            fi
          fi

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  publish-testpypi:
    name: Publish to TestPyPI (dry-run)
    needs: build
    if: github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi'
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/appss-sdk/
    permissions:
      id-token: write
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  publish-pypi:
    name: Publish to PyPI
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/appss-sdk/
    permissions:
      id-token: write
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Create GitHub Release
    needs: [build, publish-pypi]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # A release may already exist if the tag was created from the GitHub
          # UI (which creates the release too). Be idempotent: attach the built
          # artifacts to the existing release instead of failing.
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG already exists — uploading artifacts to it."
            gh release upload "$TAG" dist/* --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$TAG" dist/* \
              --repo "$GITHUB_REPOSITORY" \
              --title "$TAG" \
              --generate-notes \
              --verify-tag
          fi
